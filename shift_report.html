<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёт по смене</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#16161d;--surface2:#1e1e28;--border:#2a2a38;--accent:#7c6af7;--accent2:#f7a26a;--day:#f7d56a;--night:#6ab8f7;--text:#e8e6f0;--muted:#6b6880;--green:#5af78e;--red:#f75a5a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{padding:22px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.header h1{font-size:17px;font-weight:800;}
.header span{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.main{padding:26px 40px;max-width:900px;}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:20px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:26px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:18px;}
.upload-zone:hover{border-color:var(--accent);background:rgba(124,106,247,.05);}
.upload-zone.loaded{border-style:solid;border-color:var(--green);background:rgba(90,247,142,.04);}
.upload-zone input{display:none;}
.uz-icon{font-size:26px;margin-bottom:6px;}
.uz-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.upload-zone.loaded .uz-title{color:var(--green);}
.uz-sub{font-size:12px;color:var(--muted);}

/* Fields grid */
.fields-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:end;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
input[type="date"],input[type="time"]{
  background:var(--bg);border:1.5px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:10px;font-size:13px;font-family:'Manrope',sans-serif;
  outline:none;transition:border-color .15s;width:100%;
}
input[type="date"]:focus,input[type="time"]:focus{border-color:var(--accent);}
.mode-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.mode-btn{padding:8px 14px;font-size:12px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.mode-btn.active{background:var(--accent);color:#fff;}

.btn-gen{background:var(--accent);border:none;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn-gen:hover{opacity:.85;}

/* Custom time row */
.custom-time{display:none;grid-column:1/-1;display:none;gap:12px;align-items:end;}
.custom-time.visible{display:flex;}
.sep{font-size:20px;color:var(--muted);padding-bottom:8px;}

/* Status */
.status-bar{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 15px;margin-bottom:16px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);display:none;}
.status-bar.visible{display:block;}
.status-bar.error{border-color:var(--red);color:var(--red);}
.status-bar.ok{border-color:var(--green);color:var(--green);}

/* Report */
.report-wrap{display:none;}
.report-wrap.visible{display:block;}

.report-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.report-meta{}
.report-date{font-size:20px;font-weight:800;letter-spacing:-.02em;}
.report-period{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.report-shift-badge{display:inline-flex;align-items:center;gap:7px;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;margin-top:6px;}
.report-shift-badge.day{background:#2a2510;color:var(--day);border:1px solid #4a4020;}
.report-shift-badge.night{background:#101a2a;color:var(--night);border:1px solid #20304a;}
.report-shift-badge.custom{background:#1a1a2a;color:var(--accent);border:1px solid #3a3a5a;}

.btns-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn-action{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.btn-action:hover{border-color:var(--accent);color:var(--accent);}
.btn-action svg{width:13px;height:13px;flex-shrink:0;}
.btn-action.screenshot{border-color:#f7a26a44;color:var(--accent2);}
.btn-action.screenshot:hover{border-color:var(--accent2);background:rgba(247,162,106,.08);}

/* Report visual card — used for screenshot */
#reportCard{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:18px;}
.report-block{border-bottom:1px solid var(--border);}
.report-block:last-child{border-bottom:none;}
.block-header{padding:14px 22px 9px;display:flex;align-items:center;gap:10px;}
.block-icon{font-size:17px;}
.block-title{font-size:14px;font-weight:700;}
.block-count{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.block-items{padding:0 22px 14px;display:flex;flex-direction:column;gap:5px;}
.block-item{display:flex;align-items:center;gap:10px;padding:7px 13px;background:var(--surface2);border-radius:8px;}
.item-brand{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:130px;}
.item-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;}
.item-bar-bg{flex:1;height:4px;background:var(--border);border-radius:2px;}
.item-bar-fill{height:100%;border-radius:2px;background:var(--accent);}
.item-count{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent2);min-width:22px;text-align:right;}

/* Screenshot watermark inside card */
.card-report-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-report-title{font-size:15px;font-weight:800;}
.card-report-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

.report-text-wrap{margin-top:0;}
.report-text-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.report-text{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.9;white-space:pre-wrap;}
.empty-block{padding:20px 22px;font-size:13px;color:var(--muted);font-style:italic;}

@media(max-width:680px){
  .main{padding:16px;}
  .header{padding:18px 16px;}
  .fields-grid{grid-template-columns:1fr 1fr;}
  .card{padding:18px;}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">📊</div>
  <div><h1>Отчёт по смене</h1><span>Технические трудности · CG</span></div>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">Параметры отчёта</div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      <div class="uz-icon">📂</div>
      <div class="uz-title">Загрузите файл Excel</div>
      <div class="uz-sub">Скачайте из SharePoint/OneDrive и перетащите сюда · .xlsx</div>
    </div>

    <div class="fields-grid">
      <div class="field">
        <label>Дата с</label>
        <input type="date" id="dateFrom">
      </div>
      <div class="field">
        <label>Дата по</label>
        <input type="date" id="dateTo">
      </div>
      <div class="field">
        <label>Режим времени</label>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mDay"   onclick="setMode('day')">☀️ День</button>
          <button class="mode-btn"        id="mNight" onclick="setMode('night')">🌙 Ночь</button>
          <button class="mode-btn"        id="mCustom" onclick="setMode('custom')">⚙️</button>
        </div>
      </div>
      <div class="field" id="shiftLabelField">
        <label>Смена</label>
        <div style="font-size:12px;color:var(--muted);padding:9px 0" id="shiftLabelText">9:00 – 21:00</div>
      </div>
      <button class="btn-gen" onclick="generate()">Сформировать →</button>
    </div>

    <div class="custom-time" id="customTimeRow">
      <div class="field">
        <label>Время с</label>
        <input type="time" id="timeFrom" value="09:00">
      </div>
      <div class="sep">→</div>
      <div class="field">
        <label>Время по</label>
        <input type="time" id="timeTo" value="21:00">
      </div>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="report-wrap" id="reportWrap">
    <div class="report-actions">
      <div class="report-meta">
        <div class="report-date" id="rDate"></div>
        <div class="report-period" id="rPeriod"></div>
        <div class="report-shift-badge" id="rShift"></div>
      </div>
      <div class="btns-row">
        <button class="btn-action" onclick="copyReport()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="9" height="9" rx="2"/><path d="M3 11V3h8"/></svg>
          Копировать текст
        </button>
        <button class="btn-action screenshot" id="btnScreenshot" onclick="takeScreenshot()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="8" cy="8" r="2.5"/><path d="M5 3l1-2h4l1 2"/></svg>
          Сохранить фото
        </button>
      </div>
    </div>

    <div id="reportCard">
      <div class="card-report-header">
        <div>
          <div class="card-report-title" id="cardTitle"></div>
          <div class="card-report-sub"  id="cardSub"></div>
        </div>
        <div style="font-size:24px" id="cardEmoji">📊</div>
      </div>
      <div id="reportBody"></div>
    </div>

    <div class="report-text-wrap">
      <div class="report-text-label" style="margin-top:18px">Текст для отправки</div>
      <div class="report-text" id="reportText"></div>
    </div>
  </div>
</div>

<script>
var currentMode = 'day';
var parsedRows  = null;
var xlsxLoaded  = false;

// Default dates = today
(function(){
  var t=new Date(), p=function(n){return n<10?'0'+n:''+n;};
  var s=t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate());
  document.getElementById('dateFrom').value=s;
  document.getElementById('dateTo').value=s;
})();

// Upload
var zone=document.getElementById('uploadZone'), fi=document.getElementById('fileInput');
zone.addEventListener('click',function(){fi.click();});
zone.addEventListener('dragover',function(e){e.preventDefault();zone.style.borderColor='var(--accent)';});
zone.addEventListener('dragleave',function(){zone.style.borderColor='';});
zone.addEventListener('drop',function(e){e.preventDefault();zone.style.borderColor='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fi.addEventListener('change',function(e){if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(file){
  setStatus('⏳ Загружаю...','');
  loadXLSX(function(){
    var r=new FileReader();
    r.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array',cellDates:false,sheetStubs:false});
        var ws=wb.Sheets[wb.SheetNames[0]];
        parsedRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
        zone.classList.add('loaded');
        zone.innerHTML='<div class="uz-icon">✅</div><div class="uz-title">'+file.name+'</div><div class="uz-sub">'+(parsedRows.length-1)+' строк · нажмите для замены</div>';
        zone.addEventListener('click',function(){fi.click();});
        setStatus('✓ Файл загружен','ok');
      }catch(err){setStatus('✗ Ошибка: '+err.message,'error');}
    };
    r.readAsArrayBuffer(file);
  });
}

function loadXLSX(cb){
  if(xlsxLoaded){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){xlsxLoaded=true;cb();};
  document.head.appendChild(s);
}

function setMode(m){
  currentMode=m;
  ['day','night','custom'].forEach(function(x){
    document.getElementById('m'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===m);
  });
  var labels={day:'9:00 – 21:00',night:'21:00 – 9:00',custom:'Задайте ниже'};
  document.getElementById('shiftLabelText').textContent=labels[m];
  document.getElementById('customTimeRow').classList.toggle('visible',m==='custom');
}

function setStatus(msg,type){
  var el=document.getElementById('statusBar');
  el.textContent=msg;
  el.className='status-bar visible'+(type?' '+type:'');
}

function normDate(s){
  s=String(s||'').trim();
  if(!s)return'';
  var m1=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m1)return m1[3]+'-'+(m1[2].length<2?'0':'')+m1[2]+'-'+(m1[1].length<2?'0':'')+m1[1];
  var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m2)return m2[0];
  if(/^\d+$/.test(s)){
    var sn=parseInt(s);
    if(sn>40000&&sn<60000){var d=new Date((sn-25569)*86400000),p=function(n){return n<10?'0'+n:''+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
  }
  return s.slice(0,10);
}

function timeToMins(t){
  if(!t)return-1;
  var s=String(t).trim();
  var m=s.match(/^(\d{1,2}):(\d{2})/);
  if(m)return parseInt(m[1])*60+parseInt(m[2]);
  var f=parseFloat(s);
  if(!isNaN(f)&&f>=0&&f<1)return Math.round(f*24*60);
  return-1;
}

function detectCols(header){
  var c={time:-1,date:-1,project:-1,category:-1,prov:[]};
  header.forEach(function(h,i){
    var lh=String(h).toLowerCase().trim();
    if(c.time<0&&(lh.includes('врем')||lh==='time'))c.time=i;
    else if(c.date<0&&(lh.includes('дат')||lh==='date'))c.date=i;
    else if(c.project<0&&(lh.includes('проект')||lh.includes('бренд')||lh.includes('brand')||lh.includes('project')))c.project=i;
    else if(c.category<0&&(lh.includes('трудност')||lh.includes('категор')||lh.includes('category')||lh.includes('тип')))c.category=i;
    else if(lh.includes('провайдер')||lh.includes('provider')||lh.startsWith('prov'))c.prov.push(i);
  });
  if(c.time<0)c.time=1;if(c.date<0)c.date=2;if(c.project<0)c.project=3;if(c.category<0)c.category=5;
  if(c.prov.length===0)c.prov=[13,14,15];
  return c;
}

function generate(){
  if(!parsedRows){setStatus('⚠ Сначала загрузите файл','error');return;}
  var dateFrom=document.getElementById('dateFrom').value;
  var dateTo  =document.getElementById('dateTo').value;
  if(!dateFrom||!dateTo){setStatus('⚠ Выберите даты','error');return;}

  var tFromMins, tToMins, crossMidnight=false;
  if(currentMode==='day'){tFromMins=9*60;tToMins=21*60;}
  else if(currentMode==='night'){tFromMins=21*60;tToMins=9*60;crossMidnight=true;}
  else{
    var tf=document.getElementById('timeFrom').value, tt=document.getElementById('timeTo').value;
    if(!tf||!tt){setStatus('⚠ Укажите время','error');return;}
    tFromMins=timeToMins(tf);tToMins=timeToMins(tt);
    crossMidnight=tToMins<=tFromMins;
  }

  var cols=detectCols(parsedRows[0]);
  var catMap={},provMap={};

  for(var i=1;i<parsedRows.length;i++){
    var row=parsedRows[i];
    if(!row||row.length<4)continue;
    var rd=normDate(row[cols.date]);
    if(rd<dateFrom||rd>dateTo)continue;
    var mins=timeToMins(row[cols.time]);
    if(mins<0)continue;
    var inShift=crossMidnight?(mins>=tFromMins||mins<tToMins):(mins>=tFromMins&&mins<tToMins);
    if(!inShift)continue;
    var cat=String(row[cols.category]||'').trim();
    var project=String(row[cols.project]||'').trim().toUpperCase();
    if(!cat||!project)continue;
    var cl=cat.toLowerCase();
    if(cl.includes('провайдер')||cl.includes('provider')){
      cols.prov.forEach(function(pc){var pv=row[pc]?String(row[pc]).trim():'';if(pv&&pv!=='0')provMap[pv]=(provMap[pv]||0)+1;});
    }else{
      if(!catMap[cat])catMap[cat]={};
      catMap[cat][project]=(catMap[cat][project]||0)+1;
    }
  }

  var p=function(s){var d=s.split('-');return d[2]+'.'+d[1]+'.'+d[0];};
  var dateLabel=dateFrom===dateTo?p(dateFrom):p(dateFrom)+' – '+p(dateTo);
  var shiftLabels={day:'☀️ Дневная смена (9:00 – 21:00)',night:'🌙 Ночная смена (21:00 – 9:00)',custom:'⚙️ '+document.getElementById('timeFrom').value+' – '+document.getElementById('timeTo').value};
  var shiftLabel=shiftLabels[currentMode];
  var shiftClass={day:'day',night:'night',custom:'custom'}[currentMode];

  renderReport(dateLabel,shiftLabel,shiftClass,catMap,provMap);
}

var CAT_ICONS={'не работают слоты':'🎰','не работает сайт':'🌐','не может сделать депозит':'💳','не может сделать вывод':'💸','другое':'🔧','трудности с провайдерами':'⚙️'};
function getIcon(c){return CAT_ICONS[c.toLowerCase()]||'📌';}

function renderReport(dateLabel,shiftLabel,shiftClass,catMap,provMap){
  // Header
  document.getElementById('rDate').textContent='📅 '+dateLabel;
  document.getElementById('rPeriod').textContent='';
  var rs=document.getElementById('rShift');rs.textContent=shiftLabel;rs.className='report-shift-badge '+shiftClass;
  document.getElementById('cardTitle').textContent='📊 Отчёт по смене';
  document.getElementById('cardSub').textContent=dateLabel+' · '+shiftLabel.replace(/[☀️🌙⚙️]/g,'').trim();

  var body=document.getElementById('reportBody');body.innerHTML='';
  var textLines=['📊 Отчёт по смене','📅 '+dateLabel,'🕒 '+shiftLabel.replace(/[☀️🌙⚙️]/g,'').trim(),''];

  var ORDER=['Не работают слоты','Не работает сайт','Не может сделать депозит','Другое','Не может сделать вывод'];
  var norm=function(s){return s.toLowerCase().trim();};
  var allCats=[];
  ORDER.forEach(function(o){Object.keys(catMap).forEach(function(k){if(norm(k)===norm(o)&&allCats.indexOf(k)<0)allCats.push(k);});});
  Object.keys(catMap).forEach(function(k){if(!ORDER.some(function(o){return norm(o)===norm(k);})&&allCats.indexOf(k)<0)allCats.push(k);});

  allCats.forEach(function(cat){
    var brands=catMap[cat];
    var entries=Object.entries(brands).sort(function(a,b){return b[1]-a[1];});
    if(!entries.length)return;
    var total=entries.reduce(function(s,e){return s+e[1];},0),maxV=entries[0][1];
    var block=document.createElement('div');block.className='report-block';
    var hdr='<div class="block-header"><span class="block-icon">'+getIcon(cat)+'</span><span class="block-title">'+cat+'</span><span class="block-count">'+total+'</span></div>';
    var items='<div class="block-items">';
    textLines.push(cat+':');
    entries.forEach(function(e){
      var pct=Math.round(e[1]/maxV*100);
      items+='<div class="block-item"><span class="item-brand">'+e[0]+'</span><div class="item-bar-wrap"><div class="item-bar-bg"><div class="item-bar-fill" style="width:'+pct+'%"></div></div></div><span class="item-count">'+e[1]+'</span></div>';
      textLines.push(e[0]+' — '+e[1]);
    });
    items+='</div>';block.innerHTML=hdr+items;body.appendChild(block);textLines.push('');
  });

  var provEntries=Object.entries(provMap).sort(function(a,b){return b[1]-a[1];});
  if(provEntries.length){
    var maxP=provEntries[0][1],totP=provEntries.reduce(function(s,e){return s+e[1];},0);
    var block=document.createElement('div');block.className='report-block';
    var hdr='<div class="block-header"><span class="block-icon">⚙️</span><span class="block-title">Трудности с провайдерами</span><span class="block-count">'+totP+'</span></div>';
    var items='<div class="block-items">';
    textLines.push('Трудности с провайдерами:');
    provEntries.forEach(function(e){
      var pct=Math.round(e[1]/maxP*100);
      items+='<div class="block-item"><span class="item-brand">'+e[0]+'</span><div class="item-bar-wrap"><div class="item-bar-bg"><div class="item-bar-fill" style="width:'+pct+'%"></div></div></div><span class="item-count">'+e[1]+'</span></div>';
      textLines.push(e[0]+' — '+e[1]);
    });
    items+='</div>';block.innerHTML=hdr+items;body.appendChild(block);textLines.push('');
  }

  if(!body.children.length){body.innerHTML='<div class="empty-block">Нет данных за выбранный период</div>';textLines.push('Нет данных.');}

  document.getElementById('reportText').textContent=textLines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
  document.getElementById('reportWrap').classList.add('visible');
  setStatus('✓ Отчёт готов · '+dateLabel,'ok');
}

function copyReport(){
  var text=document.getElementById('reportText').textContent;
  navigator.clipboard.writeText(text).then(function(){
    var b=document.querySelector('.btn-action:not(.screenshot)');
    var o=b.innerHTML;b.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 8l4 4 8-8"/></svg> Скопировано!';
    setTimeout(function(){b.innerHTML=o;},2000);
  });
}

function takeScreenshot(){
  var btn=document.getElementById('btnScreenshot');
  btn.textContent='⏳ Сохраняю...';

  // Load html2canvas if not loaded
  if(typeof html2canvas==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=function(){doScreenshot(btn);};
    document.head.appendChild(s);
  }else{doScreenshot(btn);}
}

function doScreenshot(btn){
  var el=document.getElementById('reportCard');
  html2canvas(el,{
    backgroundColor:'#16161d',
    scale:2,
    useCORS:true,
    logging:false
  }).then(function(canvas){
    var link=document.createElement('a');
    var dateFrom=document.getElementById('dateFrom').value;
    link.download='report_'+dateFrom+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="8" cy="8" r="2.5"/><path d="M5 3l1-2h4l1 2"/></svg> Сохранить фото';
    setStatus('✓ Скриншот сохранён','ok');
  }).catch(function(err){
    btn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="8" cy="8" r="2.5"/><path d="M5 3l1-2h4l1 2"/></svg> Сохранить фото';
    setStatus('✗ Ошибка скриншота: '+err.message,'error');
  });
}
</script>
</body>
</html>
